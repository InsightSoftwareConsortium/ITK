name: ITK.macOS.Python

trigger:
  branches:
    include:
    - main
    - release*
  paths:
    exclude:
    - '*.md'
    - LICENSE
    - NOTICE
    - Documentation/*
    - Utilities/Debugger/*
    - Utilities/ITKv5Preparation/*
    - Utilities/Maintenance/*
    - Modules/Remote/*.remote.cmake
pr:
  paths:
    exclude:
    - '*.md'
    - LICENSE
    - NOTICE
    - Documentation/*
    - Utilities/Debugger/*
    - Utilities/ITKv5Preparation/*
    - Utilities/Maintenance/*
    - Modules/Remote/*.remote.cmake
variables:
  ExternalDataVersion: 5.4.5
  CCACHE_DIR: $(Pipeline.Workspace)/.ccache
  CCACHE_BASEDIR: $(Build.SourcesDirectory)
  CCACHE_COMPILERCHECK: content
  CCACHE_NOHASHDIR: 'true'
  CCACHE_NODIRECT: '1'
jobs:
- job: macOS
  timeoutInMinutes: 0
  cancelTimeoutInMinutes: 300
  pool:
    vmImage: macos-15
  steps:
    - checkout: self
      clean: true
      fetchDepth: 5

    - bash: |
        set -x
        if [ -n "$(System.PullRequest.SourceCommitId)" ]; then
          git checkout $(System.PullRequest.SourceCommitId)
        fi
      displayName: 'Checkout pull request HEAD'

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.10'
        architecture: 'x64'

    - bash: |
        set -x
        # Remove Homebrew LLVM to prevent its libunwind from
        # shadowing the system libunwind and producing linker warnings.
        # See https://github.com/actions/runner-images/issues/13816
        llvm_pkgs=$(brew ls -1 | grep llvm || true)
        if [ -n "$llvm_pkgs" ]; then
          brew uninstall --ignore-dependencies $llvm_pkgs
        fi
        sudo pip3 install ninja numpy
        sudo pip3 install ninja numpy>=1.20 typing-extensions
        sudo python3 -m pip install --upgrade setuptools
        sudo python3 -m pip install scikit-ci-addons
        sudo python3 -m pip install lxml dask distributed
        brew install ccache
      displayName: 'Install dependencies'

    - bash: |
        set -x

        git clone -b dashboard --single-branch https://github.com/InsightSoftwareConsortium/ITK.git ITK-dashboard

        curl -L https://github.com/InsightSoftwareConsortium/ITK/releases/download/v$(ExternalDataVersion)/InsightData-$(ExternalDataVersion).tar.gz -O
        cmake -E tar xfz InsightData-$(ExternalDataVersion).tar.gz
        cmake -E rename InsightToolkit-$(ExternalDataVersion)/.ExternalData/CID $(Build.SourcesDirectory)/.ExternalData/CID
      workingDirectory: $(Agent.BuildDirectory)
      displayName: 'Download dashboard script and testing data'

    - task: Cache@2
      inputs:
        key: '"ccache" | "$(Agent.OS)" | "$(Build.SourceVersion)"'
        restoreKeys: |
          "ccache" | "$(Agent.OS)"
        path: $(CCACHE_DIR)
      displayName: 'Restore ccache'

    - bash: ccache --evict-older-than 7d
      displayName: 'Evict old ccache entries'

    - bash: |
        python_executable=`which python3`
        python_root_dir=$(dirname $(dirname ${python_executable}))
        cat > dashboard.cmake << EOF
        set(CTEST_BUILD_CONFIGURATION "Release")
        set(CTEST_CMAKE_GENERATOR "Ninja")
        set(BUILD_NAME_SUFFIX "-Python")
        set(dashboard_cache "
          Python3_ROOT_DIR:PATH=${python_root_dir}
          Python3_EXECUTABLE:FILEPATH=${python_executable}
          DISABLE_MODULE_TESTS:BOOL=ON
          BUILD_SHARED_LIBS:BOOL=OFF
          BUILD_EXAMPLES:BOOL=OFF
          ITK_WRAP_PYTHON:BOOL=ON
          ITK_USE_CCACHE:BOOL=ON
          CMAKE_C_COMPILER_LAUNCHER:STRING=ccache
          CMAKE_CXX_COMPILER_LAUNCHER:STRING=ccache
          ITK_COMPUTER_MEMORY_SIZE:STRING=11
        ")
        include(\$ENV{AGENT_BUILDDIRECTORY}/ITK-dashboard/azure_dashboard.cmake)
        EOF
        cat dashboard.cmake
      workingDirectory: $(Agent.BuildDirectory)/ITK-dashboard
      displayName: 'Configure CTest script'

    - bash: |
        set -x

        c++ --version
        cmake --version

        ctest -S $(Agent.BuildDirectory)/ITK-dashboard/dashboard.cmake -VV -j 3
      displayName: 'Build and test'
      env:
        CTEST_OUTPUT_ON_FAILURE: 1
        CCACHE_MAXSIZE: 2.4G

    - script: |
        ci_addons ctest_junit_formatter $(Build.SourcesDirectory)-build > $(Agent.BuildDirectory)/JUnitTestResults.xml
      condition: succeededOrFailed()
      displayName: 'Format CTest output in JUnit format'

    - task: PublishTestResults@2
      inputs:
        testResultsFiles: "$(Agent.BuildDirectory)/JUnitTestResults.xml"
        testRunTitle: 'CTest $(Agent.OS)'
      condition: succeededOrFailed()
      displayName: 'Publish test results'
