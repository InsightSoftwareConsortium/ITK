# ITK 4.x Python wrapping does not build with modern Python/toolchains;
# this pipeline provides a shared-library C++ build variant instead.
trigger:
  branches:
    include:
    - release*
  paths:
    exclude:
    - '*.md'
    - LICENSE
    - NOTICE
    - Documentation/**
    - Utilities/Maintenance/**
variables:
  ExternalDataVersion: 4.13.2
  CCACHE_DIR: $(Pipeline.Workspace)/.ccache
  CCACHE_BASEDIR: $(Build.SourcesDirectory)
  CCACHE_COMPILERCHECK: content
  CCACHE_NOHASHDIR: 'true'
  CCACHE_SLOPPINESS: pch_defines,time_macros
jobs:
- job: Linux
  timeoutInMinutes: 0
  cancelTimeoutInMinutes: 300
  pool:
    vmImage: ubuntu-latest
  steps:
    - checkout: self
      clean: true
      fetchDepth: 5
    - bash: |
        set -x
        if [ -n "$(System.PullRequest.SourceCommitId)" ]; then
          git checkout $(System.PullRequest.SourceCommitId)
        fi
      displayName: 'Checkout pull request HEAD'

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.x'
        architecture: 'x64'

    - bash: |
        set -x
        sudo apt-get update
        sudo apt-get install -y ccache
        python3 -m pip install ninja lxml scikit-ci-addons
      displayName: 'Install dependencies'

    - bash: |
        set -x
        git clone -b dashboard --single-branch https://github.com/InsightSoftwareConsortium/ITK.git ITK-dashboard

        curl -L https://github.com/InsightSoftwareConsortium/ITK/releases/download/v$(ExternalDataVersion)/InsightData-$(ExternalDataVersion).tar.gz -O
        cmake -E tar xfz InsightData-$(ExternalDataVersion).tar.gz
        cmake -E rename InsightToolkit-$(ExternalDataVersion)/.ExternalData/MD5 $(Build.SourcesDirectory)/.ExternalData/MD5
      workingDirectory: $(Agent.BuildDirectory)
      displayName: 'Download dashboard script and testing data'

    - task: Cache@2
      inputs:
        key: '"ccache-v1" | "$(Agent.OS)" | "LinuxShared414" | "$(Build.SourceVersion)"'
        restoreKeys: |
          "ccache-v1" | "$(Agent.OS)" | "LinuxShared414"
        path: $(CCACHE_DIR)
      displayName: 'Restore ccache'

    - bash: |
        set -x
        ccache --zero-stats
        ccache --evict-older-than 7d
      displayName: 'ccache maintenance'

    - bash: |
        cat > dashboard.cmake << EOF
        set(CTEST_BUILD_CONFIGURATION "MinSizeRel")
        set(CTEST_CMAKE_GENERATOR "Ninja")
        set(BUILD_NAME_SUFFIX "-SharedLibs")
        set(dashboard_cache "
          BUILD_SHARED_LIBS:BOOL=ON
          BUILD_EXAMPLES:BOOL=OFF
          ITK_WRAP_PYTHON:BOOL=OFF
          ITK_USE_KWSTYLE:BOOL=OFF
          CMAKE_C_FLAGS:STRING=-w
          CMAKE_CXX_FLAGS:STRING=-w
          CMAKE_C_COMPILER_LAUNCHER:STRING=ccache
          CMAKE_CXX_COMPILER_LAUNCHER:STRING=ccache
        ")
        include(\$ENV{AGENT_BUILDDIRECTORY}/ITK-dashboard/azure_dashboard.cmake)
        EOF
        cat dashboard.cmake
      workingDirectory: $(Agent.BuildDirectory)/ITK-dashboard
      displayName: 'Configure CTest script'

    - bash: |
        set -x

        c++ --version
        cmake --version

        ctest -S $(Agent.BuildDirectory)/ITK-dashboard/dashboard.cmake -V -j 4
      displayName: 'Build and test'
      env:
        CTEST_OUTPUT_ON_FAILURE: 1
        CCACHE_MAXSIZE: 4.5G

    - bash: ccache --show-stats
      condition: always()
      displayName: 'ccache stats'

    - script: |
        ci_addons ctest_junit_formatter $(Build.SourcesDirectory)-build > $(Agent.BuildDirectory)/JUnitTestResults.xml
      condition: succeededOrFailed()
      displayName: 'Format CTest output in JUnit format'

    - task: PublishTestResults@2
      inputs:
        testResultsFiles: "$(Agent.BuildDirectory)/JUnitTestResults.xml"
        testRunTitle: 'CTest $(Agent.OS) SharedLibs'
      condition: succeededOrFailed()
      displayName: 'Publish test results'
