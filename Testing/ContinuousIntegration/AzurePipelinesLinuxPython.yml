name: ITK.Linux.Python

trigger:
  branches:
    include:
    - main
    - release*
  paths:
    exclude:
    - '*.md'
    - LICENSE
    - NOTICE
    - Documentation/*
    - Utilities/Debugger/*
    - Utilities/ITKv5Preparation/*
    - Utilities/Maintenance/*
    - Modules/Remote/*.remote.cmake
pr:
  paths:
    exclude:
    - '*.md'
    - LICENSE
    - NOTICE
    - Documentation/*
    - Utilities/Debugger/*
    - Utilities/ITKv5Preparation/*
    - Utilities/Maintenance/*
    - Modules/Remote/*.remote.cmake
variables:
  ExternalData_OBJECT_STORES: $(Pipeline.Workspace)/ExternalData
  CCACHE_DIR: $(Pipeline.Workspace)/.ccache
  CCACHE_BASEDIR: $(Build.SourcesDirectory)
  CCACHE_COMPILERCHECK: content
  CCACHE_NOHASHDIR: 'true'
  CCACHE_SLOPPINESS: pch_defines,time_macros
jobs:
- job: Linux
  timeoutInMinutes: 0
  cancelTimeoutInMinutes: 300
  pool:
    vmImage: ubuntu-22.04
  steps:
    - checkout: self
      clean: true
      fetchDepth: 5
    - bash: |
        set -x
        if [ -n "$(System.PullRequest.SourceCommitId)" ]; then
          git checkout $(System.PullRequest.SourceCommitId)
        fi
      displayName: 'Checkout pull request HEAD'

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.10'
        architecture: 'x64'

    - bash: |
        set -x
        sudo apt-get update
        sudo apt-get install -y ccache locales
        sudo locale-gen de_DE.UTF-8
        python3 -m pip install ninja typing-extensions
        python3 -m pip install --upgrade --pre numpy
        python3 -m pip install lxml scikit-ci-addons dask distributed
      displayName: 'Install dependencies'

    - bash: |
        set -x
        git clone -b dashboard --single-branch https://github.com/InsightSoftwareConsortium/ITK.git ITK-dashboard
      workingDirectory: $(Agent.BuildDirectory)
      displayName: 'Download dashboard script'

    - task: Cache@2
      inputs:
        key: '"externaldata" | "v1" | **/*.cid'
        restoreKeys: |
          "externaldata" | "v1"
        path: $(ExternalData_OBJECT_STORES)
      displayName: 'Restore ExternalData object store'

    - task: Cache@2
      inputs:
        key: '"ccache-v4" | "$(Agent.OS)" | "LinuxPython" | "$(Build.SourceVersion)"'
        restoreKeys: |
          "ccache-v4" | "$(Agent.OS)" | "LinuxPython"
        path: $(CCACHE_DIR)
      displayName: 'Restore ccache'

    - bash: |
        set -x
        ccache --zero-stats
        ccache --evict-older-than 7d
        ccache --show-config
      displayName: 'ccache config and maintenance'

    - bash: |
        python_executable=`which python3`
        python_root_dir=$(dirname $(dirname ${python_executable}))
        cat > dashboard.cmake << EOF
        set(CTEST_BUILD_CONFIGURATION "Release")
        set(CTEST_CMAKE_GENERATOR "Ninja")
        set(BUILD_NAME_SUFFIX "-Python")
        set(dashboard_cache "
          Python3_ROOT_DIR:PATH=${python_root_dir}
          Python3_EXECUTABLE:FILEPATH=${python_executable}
          DISABLE_MODULE_TESTS:BOOL=ON
          BUILD_SHARED_LIBS:BOOL=OFF
          BUILD_EXAMPLES:BOOL=OFF
          ITK_WRAP_PYTHON:BOOL=ON
          CMAKE_C_COMPILER_LAUNCHER:STRING=ccache
          CMAKE_CXX_COMPILER_LAUNCHER:STRING=ccache
          ITK_COMPUTER_MEMORY_SIZE:STRING=4.5
        ")
        include(\$ENV{AGENT_BUILDDIRECTORY}/ITK-dashboard/azure_dashboard.cmake)
        EOF
        cat dashboard.cmake
      workingDirectory: $(Agent.BuildDirectory)/ITK-dashboard
      displayName: 'Configure CTest script'

    - bash: |
        set -x

        c++ --version
        cmake --version

        ctest -S $(Agent.BuildDirectory)/ITK-dashboard/dashboard.cmake -V -j 2 -L Python -E "(PythonExtrasTest)|(PythonFastMarching)|(PythonLazyLoadingImage)|(PythonThresholdSegmentationLevelSetWhiteMatterTest)|(PythonVerifyTTypeAPIConsistency)|(PythonWatershedSegmentation1Test)"
      displayName: 'Build and test'
      env:
        CTEST_OUTPUT_ON_FAILURE: 1
        CCACHE_MAXSIZE: 8G

    - bash: |
        set -eo pipefail
        set -x
        # Shrink the local ccache and prune the build tree before the
        # implicit post-job 'Cache@2' uploader tars CCACHE_DIR. The
        # post-job tar fails ENOSPC when the runner's writable disk is
        # too full to hold the temporary archive (Azure DevOps
        # ITK.Linux.Python builds 14748 / 14751 both hit
        #   tar: Wrote only 4096 of 10240 bytes
        #   tar: Error is not recoverable
        # at 95-96% disk usage). Drop ccache items > 5 days old, force
        # the local store under 6.5G via env-var override (so the
        # tighter ceiling does not get baked into ccache.conf inside
        # CCACHE_DIR, which is what Cache@2 archives), then 'ninja
        # clean' the build tree to free the .o files no longer needed
        # after build/test reported.
        df -h /
        ccache --show-stats
        ccache --evict-older-than 5d
        CCACHE_MAXSIZE=6.5G ccache -c
        ninja -C $(Build.SourcesDirectory)-build clean || true
        df -h /
      condition: always()
      displayName: 'Free disk before post-job ccache upload'

    - bash: ccache --show-stats
      condition: always()
      displayName: 'ccache stats'

    - bash: python3 $(Build.SourcesDirectory)/Testing/ContinuousIntegration/report_build_diagnostics.py $(Build.SourcesDirectory)-build
      condition: succeededOrFailed()
      displayName: 'Report build warnings and errors'

    - script: |
        ci_addons ctest_junit_formatter $(Build.SourcesDirectory)-build > $(Agent.BuildDirectory)/JUnitTestResults.xml
      condition: succeededOrFailed()
      displayName: 'Format CTest output in JUnit format'

    - task: PublishTestResults@2
      inputs:
        testResultsFiles: "$(Agent.BuildDirectory)/JUnitTestResults.xml"
        testRunTitle: 'CTest $(Agent.OS)'
      condition: succeededOrFailed()
      displayName: 'Publish test results'
