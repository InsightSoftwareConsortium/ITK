name: pre-commit

# WIP(SWIG-4.4.1 pixi-python): disabled so only ITK.Pixi.Python runs; revert this commit to re-enable
on:
  workflow_dispatch:
jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Check install of Python, pre-commit
      run: |
        ./Utilities/GitSetup/setup-precommit
        git config hooks.SetupForDevelopment 99
        git config user.email "you@example.com"
        git config user.name "Your Name"
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - uses: pre-commit/action@v3.0.1
