name: ITK.CondaRecipe.Test

# TEMPORARY WIP workflow: validate Utilities/conda-packages/ recipe on
# Linux / Windows / macOS using rattler-build. Revert before merging the
# feature branch.

on:
    push:
        branches:
            - main
            - 'release*'
            - 'add-conda-recipe*'
    pull_request:
        paths:
            - 'Utilities/conda-packages/**'
            - 'CMake/**'
            - 'Modules/ThirdParty/HDF5/**'
            - 'Modules/ThirdParty/Eigen3/**'
            - 'Modules/Nonunit/Review/**'
            - 'Wrapping/Generators/Python/**'
            - '.github/workflows/conda-recipe-test.yml'
    workflow_dispatch:

concurrency:
    group: '${{ github.workflow }}@${{ github.head_ref || github.ref }}'
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    conda-recipe:
        runs-on: ${{ matrix.os }}
        timeout-minutes: 240
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-22.04, windows-2022, macos-15]
        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  fetch-depth: 5

            - name: Free disk space (Ubuntu)
              if: matrix.os == 'ubuntu-22.04'
              uses: BRAINSia/free-disk-space@v2
              with:
                  removalmode: "rmz"
                  swap-storage:   "true"
                  haskell:        "true"
                  dotnet:         "true"
                  docker-images:  "false"
                  tool-cache:     "true"
                  android:        "false"
                  large-packages: "true"
                  mandb:          "true"

            - name: Disk space reporting (before build)
              shell: bash
              run: |
                  echo "****** df -h"
                  df -h
                  echo "****** df -h /"
                  df -h /

            - name: Set up Pixi
              uses: prefix-dev/setup-pixi@v0.8.1

            - name: Build conda packages (rattler-build)
              shell: bash
              env:
                  ITK_CONDA_USE_CCACHE: "0"
              run: |
                  pixi run --environment dev rattler-build build --experimental \
                      --recipe Utilities/conda-packages/recipe.yaml \
                      --output-dir "${{ runner.temp }}/itk-conda-channel/"

            - name: List produced packages
              if: always()
              shell: bash
              run: |
                  echo "****** channel contents"
                  ls -lh "${{ runner.temp }}/itk-conda-channel/"*/ 2>/dev/null \
                      || ls -lh "${{ runner.temp }}/itk-conda-channel/" 2>/dev/null \
                      || echo "(no channel contents found)"

            - name: Disk space reporting (after build)
              if: always()
              shell: bash
              run: |
                  echo "****** df -h"
                  df -h

            - name: Upload conda packages
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: itk-conda-packages-${{ matrix.os }}
                  path: ${{ runner.temp }}/itk-conda-channel/**/*.conda
                  if-no-files-found: warn
                  retention-days: 7
