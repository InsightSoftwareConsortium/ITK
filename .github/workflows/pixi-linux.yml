name: ITK.Pixi

on:
    push:
        branches:
            - master
            - 'release*'
        paths-ignore:
            - '*.md'
            - LICENSE
            - NOTICE
            - 'Documentation/**'
            - 'Utilities/Debugger/**'
            - 'Utilities/ITKv5Preparation/**'
            - 'Utilities/Maintenance/**'
    pull_request:
        paths-ignore:
            - '*.md'
            - LICENSE
            - NOTICE
            - 'Documentation/**'
            - 'Utilities/Debugger/**'
            - 'Utilities/ITKv5Preparation/**'
            - 'Utilities/Maintenance/**'

env:
    ExternalDataVersion: 5.3.0

jobs:
    Pixi-Cxx:
        runs-on: ubuntu-22.04
        timeout-minutes: 0
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 5
                clean: true

            - name: Set up Pixi
              uses: prefix-dev/setup-pixi@v0.8.1

            - name: Configure
              run:
                pixi run --environment cxx configure

            - name: Build
              run:
                pixi run --environment cxx build

            - name: Test
              run:
                pixi run test