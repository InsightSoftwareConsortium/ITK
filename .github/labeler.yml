# srvaroa/labeler v1.x configuration.  See
# https://github.com/srvaroa/labeler#configuration for schema details.
# Patterns under `files:` are Go RE2 regexes matched unanchored against
# every file path in the PR; `title:` is matched against the PR title.
version: 1
labels:
  # Commit prefix regexes
  - label: "type:Compiler"
    title: "^COMP:.*"

  - label: "type:Bug"
    title: "^BUG:.*"

  - label: "type:Documentation"
    title: "^DOC:.*"

  - label: "type:Enhancement"
    title: "^ENH:.*"

  - label: "type:Performance"
    title: "^PERF:.*"

  - label: "type:Style"
    title: "^STYLE:.*"

  - label: "type:Coverage"
    title: "coverage"

  - label: "type:Design"
    title: "design"

  # Filename regexes
  - label: "area:Bridge"
    files:
      - "Modules/Bridge/*"

  - label: "area:Core"
    files:
      - "Modules/Core/*"

  - label: "area:Documentation"
    files:
      - "Documentation/*"
      - "Utilities/Doxygen/*"

  - label: "area:Examples"
    files:
      - "Examples/*"

  - label: "area:Filtering"
    files:
      - "Modules/Filtering/*"

  - label: "area:IO"
    files:
      - "Modules/IO/*"

  - label: "area:Numerics"
    files:
      - "Modules/Numerics/*"

  - label: "area:Nonunit"
    files:
      - "src/Nonunit/*"

  - label: "area:Python wrapping"
    files:
      - "Modules/Generators/Python/*"
      - "Modules/.*/wrapping/*"
      - ".*.notwrapped"
      - ".*.py.*"
      - ".*.wrap"

  - label: "area:Registration"
    files:
      - "Modules/Registration/*"

  - label: "area:Remotes"
    files:
      - "Modules/Remote/*"

  - label: "area:Segmentation"
    files:
      - "Modules/Segmentation/*"

  - label: "area:ThirdParty"
    files:
      - "Modules/ThirdParty/*"

  - label: "area:Video"
    files:
      - "Modules/Video/*"

  - label: "type:Data"
    files:
      - ".*.jpeg"
      - ".*.jpg"
      - ".*.md5"
      - ".*.png"
      - ".*.sha512"

  - label: "type:Testing"
    files:
      - "Testing/*"
      - ".*Test.*.cxx"
      - ".*Test.*.h.*"
      - ".*Test.*.py"

  - label: "type:Infrastructure"
    files:
      - ".github/*"
      - "CMake/*"
      - "Testing/ContinuousIntegration/*"
      - "Utilities/*"
