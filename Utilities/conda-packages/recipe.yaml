context:
  # Keep in sync with CMake/itkVersion.cmake — update both at release time
  version: "6.0.0"

outputs:
  - staging:
      name: build-cache
    build:
      script:
        env:
          # Opt-in ccache passthrough. Set ITK_CONDA_USE_CCACHE=1 in the
          # host shell to enable compiler caching. CCACHE_DIR and
          # CCACHE_MAXSIZE (if set on host) forward the cache location
          # and size cap so hits persist across rattler-build invocations.
          # Sandbox-specific ccache vars (BASEDIR, SLOPPINESS, etc.) are
          # set inside build.sh since $SRC_DIR changes per invocation.
          ITK_CONDA_USE_CCACHE: ${{ env.get("ITK_CONDA_USE_CCACHE", default="0") }}
          CCACHE_DIR: ${{ env.get("CCACHE_DIR", default="") }}
          CCACHE_MAXSIZE: ${{ env.get("CCACHE_MAXSIZE", default="") }}
          # Host-shell flag passthrough. These APPEND to conda-forge's
          # compiler activation flags — they do not replace them.
          # Documented in README_Advanced.md.
          ITK_CONDA_BUILD_TYPE: ${{ env.get("ITK_CONDA_BUILD_TYPE", default="Release") }}
          ITK_CONDA_EXTRA_CFLAGS: ${{ env.get("ITK_CONDA_EXTRA_CFLAGS", default="") }}
          ITK_CONDA_EXTRA_CXXFLAGS: ${{ env.get("ITK_CONDA_EXTRA_CXXFLAGS", default="") }}
          ITK_CONDA_EXTRA_LDFLAGS: ${{ env.get("ITK_CONDA_EXTRA_LDFLAGS", default="") }}
          ITK_CONDA_EXTRA_CMAKE_ARGS: ${{ env.get("ITK_CONDA_EXTRA_CMAKE_ARGS", default="") }}
        content:
        - if: unix
          then: bash Utilities/conda-packages/build.sh
          else: call Utilities\conda-packages\build.bat
    requirements:
      # Version pin policy: floors match ITK's vendored third-party
      # versions (Modules/ThirdParty/*/src/); ceilings stop at the
      # next expected ABI / API break (major version). conda-forge
      # packages move faster than ITK's vendored copies, so explicit
      # ranges are required to keep builds deterministic as upstream
      # packages advance. Revisit at each ITK release.
      build:
      - cmake >=3.22.1,<5
      - ninja
      - ${{ compiler('c') }}
      - ${{ compiler('cxx') }}
      - castxml >=0.7.0,<0.8
      # castxml 0.7.0 bundles Clang 20, which cannot parse the
      # __acquire_capability__ pack-expansion syntax introduced in
      # libc++ 22's <mutex>. Pin libc++ to <22 until a castxml release
      # builds against Clang 22+. Without this, every wrapped header
      # fails at mutex:422.
      - libcxx <22
      - if: env.get("ITK_CONDA_USE_CCACHE", default="0") == "1"
        then: ccache
      - if: build_platform != target_platform
        then: python >=3.10,<3.15
      host:
      # Use conda-forge's "compat" metapackages expat/zlib (not the
      # concrete libexpat/libzlib). The metapackages pull in the
      # lib* AND ship the CMake compat integration that find_package
      # (ZLIB) and find_package(EXPAT) use; switching to the bare lib*
      # was tried and caused CMake to fall back to the host system
      # zlib (1.2.11) and break the configure.
      - if: unix
        then:
        - expat >=2.5,<3
        - libpng >=1.6.43,<1.7
        - zlib >=1.2.13,<2
      - fftw >=3.3.10,<3.4
      - hdf5 >=1.14.5,<2
      - libjpeg-turbo >=3.0,<4
      - libtiff >=4.6,<5
      - eigen >=3.4,<3.5
      - double-conversion >=3.3,<4
      - tbb-devel >=2022.2.0,<2023
      - python >=3.10,<3.15
      # numpy headers are required by FindPython3 COMPONENTS NumPy
      # during the Python-wrapping configure. Earlier builds picked it
      # up transitively; make the dep explicit so a solver change
      # cannot drop it.
      - numpy
    source:
      path: ../..

  - package:
      name: libitk
      version: ${{ version }}
    inherit: build-cache
    build:
      number: 0
      script:
        - if: unix
          then: bash Utilities/conda-packages/libitk_install.sh
          else: call Utilities\conda-packages\libitk_install.bat
    requirements:
      run:
        # Most of these are already carried by run_exports from the
        # host pins above, but being explicit keeps the recipe
        # self-documenting and independent of feedstock behavior.
        - if: unix
          then:
            - expat >=2.5,<3
            - libpng >=1.6.43,<1.7
            - zlib >=1.2.13,<2
        - fftw >=3.3.10,<3.4
        - hdf5 >=1.14.5,<2
        - libjpeg-turbo >=3.0,<4
        - libtiff >=4.6,<5
        - double-conversion >=3.3,<4
        - tbb >=2022.2.0,<2023
    tests:
      - script:
          - if: osx
            then: test -f "$PREFIX/lib/libITKCommon-6.0.dylib"
          - if: linux
            then: test -f "$PREFIX/lib/libITKCommon-6.0.so"
          - if: win
            then: if not exist "%LIBRARY_BIN%\ITKCommon-6.0.dll" exit 1

  - package:
      name: libitk-devel
      version: ${{ version }}
    inherit: build-cache
    build:
      number: 0
      script:
        - if: unix
          then: bash Utilities/conda-packages/libitk-devel_install.sh
          else: call Utilities\conda-packages\libitk-devel_install.bat
    requirements:
      run_exports:
        - libitk ==${{ version }}
      host:
        - ${{ pin_subpackage('libitk', exact=True) }}
      run:
        - ${{ pin_subpackage('libitk', exact=True) }}
        - tbb-devel >=2022.2.0,<2023
        - cmake >=3.22.1,<5
        - eigen >=3.4,<3.5
    tests:
      - script:
          - if: unix
            then: test -d "$PREFIX/include/ITK-6.0"
            else: if not exist "%LIBRARY_INC%\ITK-6.0" exit 1
      - files:
          source:
            - Utilities/conda-packages/tests/example/
        requirements:
          build:
            - cmake
            - ninja
            - ${{ compiler('cxx') }}
        script:
          - if: unix
            then: |
              mkdir build-test && cd build-test
              cmake -GNinja -DCMAKE_PREFIX_PATH:PATH="$PREFIX" ../Utilities/conda-packages/tests/example
              cmake --build .
            else: |
              mkdir build-test && cd build-test
              cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH:PATH="%PREFIX%" ..\Utilities\conda-packages\tests\example
              cmake --build .

  - package:
      name: libitk-wrapping
      version: ${{ version }}
    inherit: build-cache
    build:
      number: 0
      script:
        - if: unix
          then: bash Utilities/conda-packages/libitk-wrapping_install.sh
          else: call Utilities\conda-packages\libitk-wrapping_install.bat
    requirements:
      host:
        - ${{ pin_subpackage('libitk', exact=True) }}
        - python >=3.10,<3.15
      run:
        - ${{ pin_subpackage('libitk', exact=True) }}
        - python >=3.10,<3.15
        - numpy
    tests:
      - python:
          imports:
            - itk

about:
  homepage: https://itk.org
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  summary: Runtime libraries, development headers, and Python wrapping for the Insight Toolkit.
